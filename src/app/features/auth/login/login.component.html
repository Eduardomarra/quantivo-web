<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <img src="assets/logo/logo.svg" alt="Logo Quantivo" class="logo">
            <h2>Bem-vindo(a)</h2>
            <p>Faça login para acessar sua conta</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Email
                </label>
                <input type="email" id="email" formControlName="email" placeholder="seu@email.com"
                    [class.is-invalid]="submitted && f['email'].invalid">
                <div *ngIf="submitted && f['email'].invalid" class="error-message">
                    <span *ngIf="f['email'].errors?.['required']">Email é obrigatório</span>
                    <span *ngIf="f['email'].errors?.['email']">Email inválido</span>
                </div>
            </div>

            <div class="form-group">
                <label for="senha">
                    <i class="fas fa-lock"></i> Senha
                </label>
                <div class="password-input-wrapper">
                    <input [type]="showPassword ? 'text' : 'password'" id="senha" formControlName="senha"
                        placeholder="Digite sua senha" [class.is-invalid]="submitted && f['senha'].invalid">
                    <button type="button" class="toggle-password" (click)="togglePassword()">
                        <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </button>
                </div>
                <div *ngIf="submitted && f['senha'].invalid" class="error-message">
                    <span *ngIf="f['senha'].errors?.['required']">Senha é obrigatória</span>
                    <span *ngIf="f['senha'].errors?.['minlength']">Senha deve ter no mínimo 6 caracteres</span>
                </div>
            </div>

            <button type="submit" [disabled]="loading" class="btn-login">
                <span *ngIf="!loading">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </span>
                <span *ngIf="loading">
                    <i class="fas fa-spinner fa-spin"></i> Entrando...
                </span>
            </button>
        </form>

        <div class="login-footer">
            <p>Não tem uma conta? <a routerLink="/register">Registre-se agora</a></p>
            <p><a routerLink="/forgot-password" class="forgot-password">Esqueceu sua senha?</a></p>
        </div>
    </div>
</div>
