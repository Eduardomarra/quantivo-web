<div class="forgot-container">
    <div class="forgot-card">
        <div class="forgot-header">
            <img src="assets/logo/logo.svg" alt="Logo Quantivo" class="logo">
            <h2>Recuperar Senha</h2>
            <p>Informe seu email para receber as instruções</p>
        </div>

        <!-- Formulário -->
        <form *ngIf="!emailSent" [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="forgot-form">
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Email
                </label>
                <input type="email" id="email" formControlName="email" placeholder="seu@email.com"
                    [class.is-invalid]="submitted && f['email'].invalid">
                <div *ngIf="submitted && f['email'].invalid" class="error-message">
                    <span *ngIf="f['email'].errors?.['required']">Email é obrigatório</span>
                    <span *ngIf="f['email'].errors?.['email']">Email inválido</span>
                </div>
            </div>

            <button type="submit" [disabled]="loading" class="btn-forgot">
                <span *ngIf="!loading">
                    <i class="fas fa-paper-plane"></i> Enviar Email
                </span>
                <span *ngIf="loading">
                    <i class="fas fa-spinner fa-spin"></i> Enviando...
                </span>
            </button>
        </form>

        <!-- Mensagem de sucesso -->
        <div *ngIf="emailSent" class="success-message">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3>Email Enviado!</h3>
            <p>Verifique sua caixa de entrada e siga as instruções para redefinir sua senha.</p>
            <p class="hint">Não recebeu? Verifique a pasta de spam ou tente novamente.</p>
            <button (click)="emailSent = false; submitted = false" class="btn-retry">
                <i class="fas fa-redo"></i> Enviar novamente
            </button>
        </div>

        <div class="forgot-footer">
            <p>Lembrou sua senha? <a routerLink="/login">Voltar ao login</a></p>
        </div>
    </div>
</div>
